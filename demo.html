<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dishwasher Test Dashboard — Demo</title>
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f4f6fa;
      --surface:     #ffffff;
      --surface2:    #f0f2f7;
      --border:      #e2e6ef;
      --text:        #1a1d27;
      --text-muted:  #6b7280;
      --primary:     #6366f1;

      --running-bg:   rgba(22,163,74,.10);
      --running-fg:   #16a34a;
      --running-bdr:  rgba(22,163,74,.3);

      --completed-bg:  rgba(99,102,241,.10);
      --completed-fg:  #4f46e5;
      --completed-bdr: rgba(99,102,241,.3);

      --idle-bg:   rgba(107,114,128,.10);
      --idle-fg:   #4b5563;
      --idle-bdr:  rgba(107,114,128,.3);

      --fault-bg:   rgba(220,38,38,.08);
      --fault-fg:   #dc2626;
      --fault-bdr:  rgba(220,38,38,.3);

      --disconnected-bg:   rgba(180,130,0,.08);
      --disconnected-fg:   #b45309;
      --disconnected-bdr:  rgba(180,130,0,.3);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== Scrollbar ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ===== Header ===== */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
    }

    .badge-live {
      font-size: .65rem;
      font-weight: 600;
      padding: 2px 8px;
      background: rgba(99,102,241,.18);
      color: var(--primary);
      border: 1px solid rgba(99,102,241,.35);
      border-radius: 999px;
    }

    .header-filters {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      flex-wrap: wrap;
    }

    .header-time {
      font-size: .78rem;
      color: var(--text-muted);
      white-space: nowrap;
      margin-left: auto;
    }

    select, input[type="text"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: .8rem;
      outline: none;
      cursor: pointer;
    }

    select:focus, input[type="text"]:focus {
      border-color: var(--primary);
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .search-wrap input {
      padding-left: 30px;
      width: 220px;
    }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: .78rem;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }

    .toggle {
      position: relative;
      width: 34px;
      height: 18px;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 999px;
      transition: .2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      left: 3px; bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: .2s;
    }

    .toggle input:checked + .toggle-slider { background: var(--primary); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); }

    /* ===== Layout Body ===== */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ===== Sidebar ===== */
    aside {
      width: 260px;
      min-width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 20px 14px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .sidebar-section-title {
      font-size: .82rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 10px;
    }

    .stat-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .stat-card-label {
      font-size: .75rem;
      color: var(--text-muted);
    }

    .stat-card-value {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .stat-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .notif-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 340px;
      overflow-y: auto;
    }

    .notif-card {
      border-radius: 8px;
      padding: 10px 12px;
      font-size: .75rem;
      border: 1px solid;
      position: relative;
      animation: slideInRight .3s ease;
    }

    .notif-card.completion {
      background: var(--completed-bg);
      border-color: var(--completed-bdr);
    }

    .notif-card.fault {
      background: var(--fault-bg);
      border-color: var(--fault-bdr);
    }

    .notif-card .notif-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }

    .notif-badge {
      font-size: .65rem;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
    }

    .notif-msg { color: var(--text); line-height: 1.4; }
    .notif-time { color: var(--text-muted); margin-top: 3px; font-size: .68rem; }

    .notif-ack {
      position: absolute;
      top: 6px; right: 6px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 2px;
      border-radius: 4px;
    }

    .notif-ack:hover { background: var(--border); color: var(--text); }

    .empty-notif {
      text-align: center;
      padding: 30px 10px;
      color: var(--text-muted);
      font-size: .78rem;
    }

    .notif-count-badge {
      font-size: .65rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 1px 7px;
      border-radius: 999px;
    }

    /* ===== Main Content ===== */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .section-group {
      margin-bottom: 32px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .section-label {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    .section-count {
      font-size: .75rem;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 999px;
    }

    .section-divider {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .station-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    /* ===== Station Card ===== */
    .station-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s, border-color .2s;
    }

    .station-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      border-color: rgba(99,102,241,.4);
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .card-slot {
      font-weight: 700;
      font-size: .95rem;
      color: var(--text);
    }

    .status-badge {
      font-size: .62rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid;
    }

    .badge-running  { background: var(--running-bg);  color: var(--running-fg);  border-color: var(--running-bdr);  animation: breathe 2s ease-in-out infinite; }
    .badge-completed { background: var(--completed-bg); color: var(--completed-fg); border-color: var(--completed-bdr); }
    .badge-idle      { background: var(--idle-bg);      color: var(--idle-fg);      border-color: var(--idle-bdr); }
    .badge-fault     { background: var(--fault-bg);     color: var(--fault-fg);     border-color: var(--fault-bdr); }
    .badge-disconnected { background: var(--disconnected-bg); color: var(--disconnected-fg); border-color: var(--disconnected-bdr); }

    @keyframes breathe {
      0%, 100% { opacity: 1; }
      50% { opacity: .55; }
    }

    .card-device {
      font-size: .72rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 10px;
    }

    .progress-section {
      margin-bottom: 10px;
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      font-size: .7rem;
      color: var(--text-muted);
      margin-bottom: 5px;
    }

    .progress-row span:last-child {
      color: var(--text);
      font-weight: 600;
    }

    .progress-bar-bg {
      height: 5px;
      border-radius: 999px;
      background: var(--surface2);
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #8b5cf6);
      border-radius: 999px;
      transition: width .5s ease;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 8px;
    }

    .metric-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 7px 8px;
    }

    .metric-label {
      font-size: .62rem;
      color: var(--text-muted);
      margin-bottom: 3px;
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .metric-value {
      font-size: .8rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-footer {
      font-size: .68rem;
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid;
    }

    .footer-completed { background: var(--completed-bg); color: var(--completed-fg); border-color: var(--completed-bdr); }
    .footer-fault     { background: var(--fault-bg);     color: var(--fault-fg);     border-color: var(--fault-bdr); }
    .footer-disconnected { background: var(--disconnected-bg); color: var(--disconnected-fg); border-color: var(--disconnected-bdr); }

    /* ===== Detail Modal ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.65);
      z-index: 200;
      align-items: center;
      justify-content: flex-end;
    }

    .modal-overlay.open { display: flex; }

    .modal-panel {
      background: var(--surface);
      border-left: 1px solid var(--border);
      width: 520px;
      max-width: 95vw;
      height: 100vh;
      overflow-y: auto;
      padding: 24px;
      animation: slideInPanel .25s ease;
    }

    @keyframes slideInPanel {
      from { transform: translateX(100%); }
      to   { transform: translateX(0); }
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
    }

    .modal-subtitle {
      font-size: .78rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .modal-close {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      padding: 6px 8px;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      transition: .15s;
    }

    .modal-close:hover { background: var(--border); color: var(--text); }

    .modal-section {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .modal-section-title {
      font-size: .82rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .modal-field label {
      font-size: .7rem;
      color: var(--text-muted);
      display: block;
      margin-bottom: 3px;
    }

    .modal-field .field-value {
      font-size: .85rem;
      font-weight: 500;
      color: var(--text);
    }

    .modal-field .field-value.mono {
      font-family: 'Courier New', monospace;
      font-size: .78rem;
    }

    .modal-progress-wrap {
      margin: 10px 0;
    }

    .modal-progress-row {
      display: flex;
      justify-content: space-between;
      font-size: .75rem;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .modal-progress-row strong {
      color: var(--text);
    }

    .progress-bar-bg.tall {
      height: 8px;
      margin-bottom: 8px;
    }

    .live-metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    .live-metric {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }

    .live-metric .lm-label {
      font-size: .65rem;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .live-metric .lm-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 14px;
      border-radius: 8px;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      transition: .15s;
      border: 1px solid;
    }

    .btn-outline {
      background: transparent;
      border-color: var(--border);
      color: var(--text-muted);
    }

    .btn-outline:hover {
      background: var(--border);
      color: var(--text);
    }

    .btn-primary {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .btn-primary:hover { opacity: .85; }

    .modal-edit-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-group label {
      font-size: .72rem;
      color: var(--text-muted);
      display: block;
      margin-bottom: 4px;
    }

    .form-group select,
    .form-group input {
      width: 100%;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }

    .updated-text {
      font-size: .7rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* ===== Toast ===== */
    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      min-width: 260px;
      max-width: 340px;
      animation: slideInRight .3s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
    }

    .toast.success { border-color: var(--completed-bdr); }
    .toast.error   { border-color: var(--fault-bdr); }

    .toast-title {
      font-size: .82rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 3px;
    }

    .toast-desc {
      font-size: .75rem;
      color: var(--text-muted);
    }

    /* ===== No results ===== */
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: .85rem;
    }

    .filter-summary {
      font-size: .72rem;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
  </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
  <span class="header-title">🍽️ Dishwasher Test Dashboard</span>
  <span class="badge-live">Live Monitor</span>

  <div class="header-filters">
    <!-- Section filter -->
    <select id="filterSection" onchange="applyFilters()">
      <option value="all">All Sections</option>
      <option value="A">Section A</option>
      <option value="B">Section B</option>
      <option value="C">Section C</option>
    </select>

    <!-- Status filter -->
    <select id="filterStatus" onchange="applyFilters()">
      <option value="all">All Status</option>
      <option value="Running">Running</option>
      <option value="Idle">Idle</option>
      <option value="Completed">Completed</option>
      <option value="Fault">Fault</option>
      <option value="Disconnected">Disconnected</option>
    </select>

    <!-- Search -->
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input type="text" id="filterSearch" placeholder="Search station or device SN..." oninput="applyFilters()" />
    </div>

    <!-- Hide Disconnected -->
    <label class="toggle-label">
      <span class="toggle">
        <input type="checkbox" id="hideDisconnected" onchange="applyFilters()" />
        <span class="toggle-slider"></span>
      </span>
      Hide Disconnected
    </label>
  </div>

  <div class="header-time" id="clockDisplay"></div>
</header>

<!-- ===== LAYOUT ===== -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside>
    <div>
      <div class="sidebar-section-title">System Statistics</div>
      <div class="stat-card">
        <div>
          <div class="stat-card-label">总工站数量</div>
          <div class="stat-card-value" id="statTotal">—</div>
        </div>
        <div class="stat-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2">
            <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/>
          </svg>
        </div>
      </div>
      <div class="stat-card">
        <div>
          <div class="stat-card-label">测试机器数量</div>
          <div class="stat-card-value" id="statDevices">—</div>
        </div>
        <div class="stat-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M19.07 4.93A10 10 0 0 0 12 2v3M4.93 19.07A10 10 0 0 0 12 22v-3M4.93 4.93A10 10 0 0 0 2 12h3M19.07 19.07A10 10 0 0 0 22 12h-3"/>
          </svg>
        </div>
      </div>
      <div class="stat-card">
        <div>
          <div class="stat-card-label">空余工站</div>
          <div class="stat-card-value" id="statIdle">—</div>
        </div>
        <div class="stat-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
      </div>
      <div class="stat-card">
        <div>
          <div class="stat-card-label">维修工站</div>
          <div class="stat-card-value" id="statFault">—</div>
        </div>
        <div class="stat-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        </div>
      </div>
    </div>

    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div class="sidebar-section-title" style="margin-bottom:0">Notifications</div>
        <span class="notif-count-badge" id="notifCountBadge">0</span>
      </div>
      <div class="notif-list" id="notifList">
        <div class="empty-notif">
          <div style="font-size:1.8rem;margin-bottom:6px;opacity:.4">🔔</div>
          <div>No notifications</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main id="mainContent"></main>
</div>

<!-- ===== DETAIL DRAWER ===== -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal-panel" id="modalPanel">
    <div id="modalContent"></div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast-container" id="toastContainer"></div>


<script>
// ============================================================
//  DATA & CONSTANTS
// ============================================================
const DEVICE_MODELS = ['QMT-300', 'QMT-500', 'WD-Pro', 'HD-Max'];
const PROGRAMS = ['Magic Daily', 'Maximum Cleaning', 'Quick Washer', 'ECO', 'Glass Washer'];
const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

let stations = [];
let notifications = [];
let notifIdCounter = 0;
let selectedStation = null;

// ============================================================
//  HELPERS
// ============================================================
const rand = () => Math.random();
const randInt = (min, max) => Math.floor(rand() * (max - min + 1)) + min;
const pick = arr => arr[Math.floor(rand() * arr.length)];

function genSN() {
  const L = LETTERS;
  return `${pick(L)}${pick(L)}${String(randInt(0,999)).padStart(3,'0')}${pick(L)}${pick(L)}.${randInt(0,9)}${pick(L)}${pick(L)}`;
}

function formatTime(mins) {
  if (mins <= 0) return '0 min';
  const h = Math.floor(mins / 60), m = mins % 60;
  return h > 0 ? `${h}h ${m}m` : `${m} min`;
}

function formatDateTime(iso) {
  return new Date(iso).toLocaleString('en-US', {
    month:'short', day:'2-digit', year:'numeric',
    hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false
  });
}

function relTime(ts) {
  const diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 60) return 'Just now';
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return new Date(ts).toLocaleDateString();
}

// ============================================================
//  DATA GENERATION
// ============================================================
function generateStations() {
  const weights = { Running:.4, Idle:.3, Completed:.15, Fault:.1, Disconnected:.05 };
  const statuses = Object.keys(weights);
  const cumulative = [];
  let c = 0;
  statuses.forEach(s => { c += weights[s]; cumulative.push([s, c]); });

  const result = [];
  ['A','B','C'].forEach(section => {
    for (let i = 1; i <= 8; i++) {
      const id = `${section}${String(i).padStart(2,'0')}`;
      const r = rand();
      let status = 'Idle';
      for (const [s, cum] of cumulative) { if (r <= cum) { status = s; break; } }

      const totalTime = randInt(45, 120);
      const timeRemaining = status === 'Running' ? randInt(0, totalTime) : 0;

      result.push({
        id, section,
        slot_code: `${section}-${i}`,
        device_model: rand() > .1 ? pick(DEVICE_MODELS) : undefined,
        device_sn:    rand() > .1 ? genSN() : undefined,
        status,
        time_remaining: timeRemaining,
        total_time: totalTime,
        cycles: randInt(1, 1000),
        program_name: (status !== 'Idle' && status !== 'Disconnected') ? pick(PROGRAMS) : undefined,
        temperature_c: status === 'Running' ? randInt(65, 85) : undefined,
        inflow_l:      status === 'Running' ? +(2.5 + rand() * 1.5).toFixed(2) : undefined,
        updated_at: new Date().toISOString()
      });
    }
  });
  return result;
}

// ============================================================
//  REAL-TIME UPDATE
// ============================================================
function tickUpdate() {
  const newNotifs = [];

  stations = stations.map(st => {
    if (st.status !== 'Running') return st;
    const s = { ...st };
    s.time_remaining = Math.max(0, s.time_remaining - 1);
    if (s.temperature_c) s.temperature_c = Math.max(60, Math.min(85, s.temperature_c + (rand()-.5)*2));
    if (s.inflow_l)      s.inflow_l      = Math.max(2.0, Math.min(4.5, s.inflow_l + (rand()-.5)*.2));

    if (s.time_remaining === 0) {
      const success = rand() > .1;
      s.status = success ? 'Completed' : 'Fault';
      s.temperature_c = undefined;
      s.inflow_l = undefined;
      newNotifs.push({
        id: String(++notifIdCounter),
        type: success ? 'completion' : 'fault',
        stationId: s.id,
        message: success
          ? `Station ${s.slot_code} completed ${s.program_name} program`
          : `Station ${s.slot_code} encountered a fault - requires maintenance`,
        timestamp: Date.now()
      });
    }
    s.updated_at = new Date().toISOString();
    return s;
  });

  if (newNotifs.length) {
    notifications = [...newNotifs, ...notifications].slice(0, 30);
    renderNotifications();
  }

  // Update cards in-place without full re-render to avoid flicker
  stations.forEach(st => updateCardInPlace(st));
  updateStats();

  // Update modal if open
  if (selectedStation) {
    const fresh = stations.find(s => s.id === selectedStation.id);
    if (fresh) { selectedStation = fresh; refreshModalMetrics(); }
  }
}

// ============================================================
//  FILTERS
// ============================================================
function getFilters() {
  return {
    section: document.getElementById('filterSection').value,
    status:  document.getElementById('filterStatus').value,
    search:  document.getElementById('filterSearch').value.toLowerCase().trim(),
    hideDisconnected: document.getElementById('hideDisconnected').checked
  };
}

function applyFilters() { renderMain(); }

function filteredStations() {
  const f = getFilters();
  return stations.filter(st => {
    if (f.section !== 'all' && st.section !== f.section) return false;
    if (f.status  !== 'all' && st.status  !== f.status)  return false;
    if (f.hideDisconnected && st.status === 'Disconnected') return false;
    if (f.search) {
      const hay = `${st.id} ${st.slot_code} ${st.device_sn || ''} ${st.device_model || ''}`.toLowerCase();
      if (!hay.includes(f.search)) return false;
    }
    return true;
  });
}

// ============================================================
//  STATUS BADGE HTML
// ============================================================
function statusBadgeHTML(status) {
  const map = {
    Running:      'badge-running',
    Completed:    'badge-completed',
    Idle:         'badge-idle',
    Fault:        'badge-fault',
    Disconnected: 'badge-disconnected'
  };
  return `<span class="status-badge ${map[status] || 'badge-idle'}">${status}</span>`;
}

// ============================================================
//  CARD HTML
// ============================================================
function cardHTML(st) {
  const progress = st.total_time > 0
    ? Math.round((st.total_time - st.time_remaining) / st.total_time * 100) : 0;

  const deviceInfo = (st.device_model && st.device_sn)
    ? `${st.device_model} ${st.device_sn.length > 12 ? st.device_sn.slice(0,8)+'…' : st.device_sn}`
    : 'No device assigned';

  const progressSection = st.status === 'Running' ? `
    <div class="progress-section">
      <div class="progress-row">
        <span>⏱ Time remaining</span>
        <span>${formatTime(st.time_remaining)}</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" style="width:${progress}%"></div>
      </div>
    </div>` : '';

  const footerMap = {
    Completed:    `<div class="card-footer footer-completed">✓ Task completed successfully</div>`,
    Fault:        `<div class="card-footer footer-fault">⚠ Maintenance required</div>`,
    Disconnected: `<div class="card-footer footer-disconnected">✗ Connection lost</div>`
  };

  return `
    <div class="station-card" id="card-${st.id}" onclick="openDetail('${st.id}')">
      <div class="card-top">
        <div class="card-slot">${st.slot_code}</div>
        ${statusBadgeHTML(st.status)}
      </div>
      <div class="card-device">${deviceInfo}</div>
      ${progressSection}
      <div class="metrics-grid">
        <div class="metric-box">
          <div class="metric-label">🔄 Cycles</div>
          <div class="metric-value" id="mc-cycles-${st.id}">${st.cycles.toLocaleString()}</div>
        </div>
        <div class="metric-box">
          <div class="metric-label">📋 Program</div>
          <div class="metric-value">${st.program_name || 'None'}</div>
        </div>
        <div class="metric-box">
          <div class="metric-label">🌡 Temp</div>
          <div class="metric-value" id="mc-temp-${st.id}">${st.temperature_c ? Math.round(st.temperature_c)+'℃' : '--'}</div>
        </div>
        <div class="metric-box">
          <div class="metric-label">💧 Inflow</div>
          <div class="metric-value" id="mc-inflow-${st.id}">${st.inflow_l ? st.inflow_l.toFixed(1)+'L' : '--'}</div>
        </div>
      </div>
      ${footerMap[st.status] || ''}
    </div>`;
}

// ============================================================
//  UPDATE CARD IN PLACE (avoid full re-render flicker)
// ============================================================
function updateCardInPlace(st) {
  const card = document.getElementById(`card-${st.id}`);
  if (!card) return; // card not visible (filtered out)

  // Badge
  const badge = card.querySelector('.status-badge');
  const map = { Running:'badge-running', Completed:'badge-completed', Idle:'badge-idle', Fault:'badge-fault', Disconnected:'badge-disconnected' };
  badge.className = `status-badge ${map[st.status] || 'badge-idle'}`;
  badge.textContent = st.status;

  // Progress
  const progressSection = card.querySelector('.progress-section');
  if (st.status === 'Running') {
    const progress = st.total_time > 0
      ? Math.round((st.total_time - st.time_remaining) / st.total_time * 100) : 0;
    if (!progressSection) {
      // Was not running before — re-render card
      card.outerHTML = cardHTML(st);
      return;
    }
    progressSection.querySelector('.progress-bar-fill').style.width = progress + '%';
    progressSection.querySelector('.progress-row span:last-child').textContent = formatTime(st.time_remaining);
  } else if (progressSection) {
    // Stopped — re-render card
    const parent = card.parentNode;
    const next = card.nextSibling;
    const newCard = document.createElement('div');
    newCard.innerHTML = cardHTML(st);
    parent.insertBefore(newCard.firstElementChild, next);
    card.remove();
    return;
  }

  // Metrics
  const tempEl = document.getElementById(`mc-temp-${st.id}`);
  const inflowEl = document.getElementById(`mc-inflow-${st.id}`);
  if (tempEl) tempEl.textContent = st.temperature_c ? Math.round(st.temperature_c) + '℃' : '--';
  if (inflowEl) inflowEl.textContent = st.inflow_l ? st.inflow_l.toFixed(1) + 'L' : '--';
}

// ============================================================
//  RENDER MAIN GRID
// ============================================================
function renderMain() {
  const main = document.getElementById('mainContent');
  const visible = filteredStations();
  const sections = ['A','B','C'];

  const total = visible.length;
  const runningCount = visible.filter(s => s.status === 'Running').length;

  let html = `<div class="filter-summary">${total} station(s) displayed — ${runningCount} running</div>`;

  sections.forEach(sec => {
    const secStations = visible.filter(s => s.section === sec);
    if (secStations.length === 0) return;

    html += `
      <div class="section-group">
        <div class="section-header">
          <span class="section-label">Section ${sec}</span>
          <span class="section-count">${secStations.length} stations</span>
          <div class="section-divider"></div>
        </div>
        <div class="station-grid" id="grid-${sec}">
          ${secStations.map(cardHTML).join('')}
        </div>
      </div>`;
  });

  if (total === 0) {
    html += `<div class="no-results">🔍 No stations match current filters.</div>`;
  }

  main.innerHTML = html;
}

// ============================================================
//  STATS
// ============================================================
function updateStats() {
  const total  = stations.length;
  const devs   = stations.filter(s => s.device_model && s.device_sn).length;
  const idle   = stations.filter(s => s.status === 'Idle').length;
  const fault  = stations.filter(s => s.status === 'Fault').length;

  document.getElementById('statTotal').textContent   = total;
  document.getElementById('statDevices').textContent = devs;
  document.getElementById('statIdle').textContent    = idle;
  document.getElementById('statFault').textContent   = fault;
}

// ============================================================
//  NOTIFICATIONS
// ============================================================
function renderNotifications() {
  document.getElementById('notifCountBadge').textContent = notifications.length;
  const list = document.getElementById('notifList');

  if (notifications.length === 0) {
    list.innerHTML = `<div class="empty-notif"><div style="font-size:1.8rem;margin-bottom:6px;opacity:.4">🔔</div><div>No notifications</div></div>`;
    return;
  }

  list.innerHTML = notifications.map(n => `
    <div class="notif-card ${n.type}" id="notif-${n.id}">
      <div class="notif-header">
        <span>${n.type === 'fault' ? '⚠️' : '✅'}</span>
        <span class="notif-badge">${n.stationId}</span>
      </div>
      <div class="notif-msg">${n.message}</div>
      <div class="notif-time">${relTime(n.timestamp)}</div>
      <button class="notif-ack" onclick="ackNotif('${n.id}')">✕</button>
    </div>`).join('');
}

function ackNotif(id) {
  notifications = notifications.filter(n => n.id !== id);
  renderNotifications();
}

// ============================================================
//  CLOCK
// ============================================================
function updateClock() {
  document.getElementById('clockDisplay').textContent =
    new Date().toLocaleString('en-US', {
      year:'numeric', month:'short', day:'2-digit',
      hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false
    });
}

// ============================================================
//  DETAIL DRAWER
// ============================================================
function openDetail(id) {
  selectedStation = stations.find(s => s.id === id);
  if (!selectedStation) return;
  renderModal(selectedStation, false);
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  selectedStation = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function renderModal(st, editMode) {
  const progress = st.total_time > 0
    ? Math.round((st.total_time - st.time_remaining) / st.total_time * 100) : 0;

  const statusSel = ['Running','Idle','Completed','Fault','Disconnected']
    .map(s => `<option value="${s}" ${s === st.status ? 'selected' : ''}>${s}</option>`).join('');

  const editForm = editMode ? `
    <div class="modal-edit-form">
      <div class="form-group">
        <label>Status</label>
        <select id="editStatus">${statusSel}</select>
      </div>
      <div class="form-group">
        <label>Cycles</label>
        <input type="number" id="editCycles" value="${st.cycles}" />
      </div>
      <div class="form-group">
        <label>Time Remaining (min)</label>
        <input type="number" id="editTime" value="${st.time_remaining}" />
      </div>
      <div class="form-group">
        <label>Program</label>
        <input type="text" id="editProgram" value="${st.program_name || ''}" />
      </div>
      <div class="form-group">
        <label>Temperature (℃)</label>
        <input type="number" id="editTemp" value="${st.temperature_c || ''}" placeholder="—" />
      </div>
      <div class="form-group">
        <label>Inflow (L)</label>
        <input type="number" step="0.1" id="editInflow" value="${st.inflow_l || ''}" placeholder="—" />
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveEdit()">💾 Save Changes</button>
      <button class="btn btn-outline" onclick="renderModal(selectedStation, false)">Cancel</button>
    </div>` : `
    <div class="modal-progress-wrap">
      <div class="modal-progress-row">
        <span>⏱ Time remaining</span>
        <strong id="md-timeRemaining">${formatTime(st.time_remaining)}</strong>
      </div>
      <div class="modal-progress-row">
        <span>Total duration</span>
        <span>${formatTime(st.total_time)}</span>
      </div>
      <div class="progress-bar-bg tall">
        <div class="progress-bar-fill" id="md-progressFill" style="width:${progress}%"></div>
      </div>
    </div>
    <div class="live-metrics">
      <div class="live-metric">
        <div class="lm-label">🔄 Cycles</div>
        <div class="lm-value" id="md-cycles">${st.cycles.toLocaleString()}</div>
      </div>
      <div class="live-metric">
        <div class="lm-label">🌡 Temperature</div>
        <div class="lm-value" id="md-temp">${st.temperature_c ? Math.round(st.temperature_c)+'℃' : '—'}</div>
      </div>
      <div class="live-metric">
        <div class="lm-label">💧 Inflow</div>
        <div class="lm-value" id="md-inflow">${st.inflow_l ? st.inflow_l.toFixed(1)+'L' : '—'}</div>
      </div>
    </div>
    <div class="btn-row" style="margin-top:14px">
      <button class="btn btn-outline" onclick="renderModal(selectedStation, true)">✏️ Edit</button>
    </div>`;

  document.getElementById('modalContent').innerHTML = `
    <div class="modal-header">
      <div>
        <div class="modal-title">Station ${st.slot_code}</div>
        <div class="modal-subtitle">Detailed information and controls</div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">
        <span>⚙️ Basic Information</span>
        ${statusBadgeHTML(st.status)}
      </div>
      <div class="modal-grid">
        <div class="modal-field"><label>Station ID</label><div class="field-value">${st.id}</div></div>
        <div class="modal-field"><label>Section</label><div class="field-value">Section ${st.section}</div></div>
        <div class="modal-field"><label>Device Model</label><div class="field-value">${st.device_model || 'N/A'}</div></div>
        <div class="modal-field"><label>Device SN</label><div class="field-value mono">${st.device_sn || 'N/A'}</div></div>
      </div>
      <hr/>
      <div class="updated-text">📅 Last updated: ${formatDateTime(st.updated_at)}</div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">
        <span>⏱ Current Status — ${st.program_name || 'No program'}</span>
      </div>
      ${editForm}
    </div>`;
}

function refreshModalMetrics() {
  const st = selectedStation;
  if (!st) return;

  const timeEl   = document.getElementById('md-timeRemaining');
  const fillEl   = document.getElementById('md-progressFill');
  const tempEl   = document.getElementById('md-temp');
  const inflowEl = document.getElementById('md-inflow');
  const cyclesEl = document.getElementById('md-cycles');
  const badgeEl  = document.querySelector('#modalContent .status-badge');

  if (!timeEl) return; // edit mode active

  const progress = st.total_time > 0
    ? Math.round((st.total_time - st.time_remaining) / st.total_time * 100) : 0;

  if (timeEl)   timeEl.textContent   = formatTime(st.time_remaining);
  if (fillEl)   fillEl.style.width   = progress + '%';
  if (tempEl)   tempEl.textContent   = st.temperature_c ? Math.round(st.temperature_c) + '℃' : '—';
  if (inflowEl) inflowEl.textContent = st.inflow_l ? st.inflow_l.toFixed(1) + 'L' : '—';
  if (cyclesEl) cyclesEl.textContent = st.cycles.toLocaleString();

  if (badgeEl) {
    const map = { Running:'badge-running', Completed:'badge-completed', Idle:'badge-idle', Fault:'badge-fault', Disconnected:'badge-disconnected' };
    badgeEl.className = `status-badge ${map[st.status] || 'badge-idle'}`;
    badgeEl.textContent = st.status;
  }
}

function saveEdit() {
  const status    = document.getElementById('editStatus').value;
  const cycles    = parseInt(document.getElementById('editCycles').value) || selectedStation.cycles;
  const timeRem   = parseInt(document.getElementById('editTime').value) || 0;
  const program   = document.getElementById('editProgram').value;
  const tempVal   = parseFloat(document.getElementById('editTemp').value) || undefined;
  const inflowVal = parseFloat(document.getElementById('editInflow').value) || undefined;

  const updated = {
    ...selectedStation,
    status,
    cycles,
    time_remaining: timeRem,
    program_name: program || undefined,
    temperature_c: tempVal,
    inflow_l: inflowVal,
    updated_at: new Date().toISOString()
  };

  stations = stations.map(s => s.id === updated.id ? updated : s);
  selectedStation = updated;

  // Re-render card
  const card = document.getElementById(`card-${updated.id}`);
  if (card) {
    const parent = card.parentNode;
    const next = card.nextSibling;
    const tmp = document.createElement('div');
    tmp.innerHTML = cardHTML(updated);
    parent.insertBefore(tmp.firstElementChild, next);
    card.remove();
  }

  updateStats();
  renderModal(updated, false);
  showToast('Station Updated', `Station ${updated.slot_code} has been updated.`, 'success');
}

// ============================================================
//  TOAST
// ============================================================
function showToast(title, desc, type = 'success') {
  const container = document.getElementById('toastContainer');
  const id = 'toast-' + Date.now();
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.id = id;
  el.innerHTML = `<div class="toast-title">${title}</div><div class="toast-desc">${desc}</div>`;
  container.appendChild(el);
  setTimeout(() => { const t = document.getElementById(id); if (t) t.remove(); }, 3500);
}

// ============================================================
//  INIT & LOOP
// ============================================================
stations = generateStations();
renderMain();
updateStats();
renderNotifications();
updateClock();

setInterval(tickUpdate, 1000);
setInterval(updateClock, 1000);
setInterval(renderNotifications, 10000); // refresh relative times
</script>
</body>
</html>
