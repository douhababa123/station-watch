swagger: "2.0"
info:
  title: "Home Connect API"
  description: |
    This API provides access to home appliances enabled by Home Connect
    (https://home-connect.com). Through the API programs can be started and
    stopped, or home appliances configured and monitored. For instance, you can
    start a cotton program on a washer and get a notification when the cycle is
    complete.

    To get started with this web client, visit https://developer.home-connect.com
    and register an account. An application with a client ID for this API client
    will be automatically generated for you.

    If you want to use your custom application here, please remember to set its
    Redirect URI to https://apiclient.home-connect.com/o2c.html, otherwise
    authorization process will fail.

    In order to use this API in your own client, you need an OAuth 2 client
    implementing the authorization code grant flow
    (https://api-docs.home-connect.com/authorization?#authorization-code-grant-flow).


    More details can be found here: https://www.rfc-editor.org/rfc/rfc6749.txt

    Authorization URL: https://api.home-connect.com/security/oauth/authorize

    Token URL: https://api.home-connect.com/security/oauth/token

  version: "1"

externalDocs:
  description: Home Connect Developer Portal
  url: "https://developer.home-connect.com/"
host: api.home-connect.com
schemes:
  - "https"
consumes:
  - application/vnd.bsh.sdk.v1+json
produces:
  - application/vnd.bsh.sdk.v1+json
basePath: /api
tags:
  - name: appliances
    description: Enumerate your home appliances
  - name: programs
    description: Start, select, monitor and stop programs
  - name: status
    description: Get status
  - name: events
    description: Get value changes via SSE

  - name: images
    description: Access the camera in the fridge
  - name: settings
    description: Get and set settings
  - name: commands
    description: Send commands


responses:
  Unauthorized:
    description: Unauthorized - No or invalid access token
    schema:
      $ref: '#/definitions/UnauthorizedError'
  Forbidden:
    description: Forbidden - Scope has not been granted
    schema:
      $ref: '#/definitions/ForbiddenError'
  NotFound:
    description: The requested resource was not found
    schema:
      $ref: '#/definitions/NotFoundError'
  NoProgramSelected:
    description: No program is currently selected
    schema:
      $ref: '#/definitions/NoProgramSelectedError'
  NoProgramActive:
    description: No program is currently active
    schema:
      $ref: '#/definitions/NoProgramActiveError'
  NotAcceptable:
    description: The resource identified by the request is only capable of generating response entities which have content characteristics not acceptable according to the accept headers sent in the request.
    schema:
      $ref: '#/definitions/NotAcceptableError'
  RequestTimeout:
    description: API Server failed to produce an answer or has no connection to backend service
    schema:
      $ref: '#/definitions/RequestTimeoutError'
  HomeApplianceError:
    description: |
      An error occured during communication with the home appliance or the home appliance itself
      answered with an error, e.g. because the issued command was unacceptable in the current state.
    schema:
      $ref: '#/definitions/ConflictError'
  SelectedProgramNotSet:
    description: No program is currently selected
    schema:
      $ref: '#/definitions/SelectedProgramNotSetError'
  ActiveProgramNotSet:
    description: No program is currently active
    schema:
      $ref: '#/definitions/ActiveProgramNotSetError'
  WrongOperationState:
    description: Request cannot be performed since the OperationState is wrong
    schema:
      $ref: '#/definitions/WrongOperationStateError'
  ProgramNotAvailable:
    description: The requested program is not available
    schema:
      $ref: '#/definitions/ProgramNotAvailableError'
  ContentTypeError:
    description: The request's Content-Type is not supported.
    schema:
      $ref: '#/definitions/UnsupportedMediaTypeError'
  QuotaError:
    description: |
      The number of requests for a specific endpoint exceeded the quota of the client.
    schema:
      $ref: '#/definitions/TooManyRequestsError'
  InternalError:
    description: Internal Server Error
    schema:
      $ref: '#/definitions/InteralServerError'
  Conflict:
    description: Command/Query cannot be executed for the home appliance, the error response contains the error details
    schema:
      $ref: '#/definitions/Conflict'

paths:
  /homeappliances:
    get:
      summary: Get all home appliances which are paired with the logged-in user account
      operationId: get_home_appliances
      description: |
        This endpoint returns a list of all home appliances which are paired
        with the logged-in user account. All paired home appliances are returned
        independent of their current connection state. The connection state can
        be retrieved within the field 'connected' of the respective home appliance.
        The haId is the primary access key for further API access to a specific
        home appliance.
      tags:
        - appliances
      responses:
        200:
          description: List of home appliances
          schema:
            $ref: '#/definitions/ArrayOfHomeAppliances'
        401:
          $ref: "#/responses/Unauthorized"
        403:
          $ref: "#/responses/Forbidden"
        406:
          $ref: "#/responses/NotAcceptable"
        429:
          $ref: "#/responses/QuotaError"
        500:
          $ref: "#/responses/InternalError"
      security:
        - homeconnect_auth:
          - IdentifyAppliance
  /homeappliances/{haId}:
    parameters:
      - name: haId
        in: path
        description: ID of home appliance
        required: true
        type: string
    get:
      summary: Get a specfic home appliances which are paired with the logged-in user account
      operationId: get_specific_appliance
      description: |
        This endpoint returns a specific home appliance which is paired with the
        logged-in user account. It is returned independent of their current
        connection state. The connection state can be retrieved within the field
        'connected' of the respective home appliance.
        The haId is the primary access key for further API access to a specific
        home appliance.
      tags:
        - appliances
      responses:
        200:
          description: Details of requested home appliance
          schema:
            $ref: '#/definitions/HomeAppliance'
        401:
          $ref: "#/responses/Unauthorized"
        403:
          $ref: "#/responses/Forbidden"
        406:
          $ref: "#/responses/NotAcceptable"
        429:
          $ref: "#/responses/QuotaError"
        500:
          $ref: "#/responses/InternalError"
      security:
        - homeconnect_auth:
          - IdentifyAppliance




