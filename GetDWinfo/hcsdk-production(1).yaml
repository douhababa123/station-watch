definitions:
  HomeAppliance:
    type: object
    required:
      - data
    properties:
      data:
        type: object
        properties:
          haId:
            type: string
            description: Unique identifier representing a specific home appliance
          name:
            type: string
            description: iendly name of the home appliance
          type:
            type: string
            description: Type of the home appliance
          brand:
            type: string
            description: Brand of the home appliance
          vib:
            type: string
            description: The type code (VIB) of the home appliance
          enumber:
            type: string
            description: Combination of VIB and customer index (VIB/KI)
          connected:
            type: boolean
            description: Current connection state of the home appliance. True if the home appliance is online, false otherwise

    example:
      data:
        name: My Bosch Oven
        brand: BOSCH
        vib: HNG6764B6
        connected: true
        type: Oven
        enumber: HNG6764B6/09
        haId: BOSCH-HNG6764B6-0000000011FF


  ArrayOfHomeAppliances:
    type: object
    description: |
      Object containing an array of home appliances
    required:
      - data
    properties:
      data:
        type: object
        required:
          - homeappliances
        properties:
          homeappliances:
            type: array
            items:
              type: object
              required:
                - haId
                - name
                - type
                - brand
                - vib
                - enumber
                - connected
              properties:
                haId:
                  type: string
                  description: Unique identifier representing a specific home appliance
                name:
                  type: string
                  description: User-friendly name of the home appliance
                type:
                  type: string
                  description: Type of the home appliance
                brand:
                  type: string
                  description: Brand of the home appliance
                vib:
                  type: string
                  description: The type code (VIB) of the home appliance
                enumber:
                  type: string
                  description: Combination of VIB and customer index (VIB/KI)
                connected:
                  type: boolean
                  description: Current connection state of the home appliance. True if the home appliance is online, false otherwise

    example:
      data:
        homeappliances:
          - name: My Bosch Oven
            brand: BOSCH
            vib: HNG6764B6
            connected: true
            type: Oven
            enumber: HNG6764B6/09
            haId: BOSCH-HNG6764B6-0000000011FF



  UnauthorizedError:
    type: object
    required:
      - error
    properties:
      error:
        type: object
        required:
          - key
        properties:
          key:
            type: string
          description:
            type: string
    example:
      error:
        key: invalid_token
        description: The access token expired
  ForbiddenError:
    type: object
    required:
      - error
    properties:
      error:
        type: object
        required:
          - key
        properties:
          key:
            type: string
          description:
            type: string
    example:
      error:
        key: insufficient_scope
        description: Insufficient scope for this resource
  NotFoundError:
    type: object
    required:
      - error
    properties:
      error:
        type: object
        required:
          - key
        properties:
          key:
            type: string
          description:
            type: string
    example:
      error:
        key: "404"
        description: The requested resource could not be found but may be available again in the future.
  NoProgramSelectedError:
    type: object
    required:
      - error
    properties:
      error:
        type: object
        required:
          - key
        properties:
          key:
            type: string
          description:
            type: string
    example:
      error:
        key: SDK.Error.NoProgramSelected
        description: There is no program selected
  NoProgramActiveError:
    type: object
    required:
      - error
    properties:
      error:
        type: object
        required:
          - key
        properties:
          key:
            type: string
          description:
            type: string
    example:
      error:
        key: SDK.Error.NoProgramActive
        description: There is no program active
  NotAcceptableError:
    type: object
    required:
      - error
    properties:
      error:
        type: object
        required:
          - key
        properties:
          key:
            type: string
          description:
            type: string
    example:
      error:
        key: "406"
        description: Resource representation is only available with these types:\napplication/vnd.bsh.sdk.v1+json
  RequestTimeoutError:
    type: object
    required:
      - error
    properties:
      error:
        type: object
        required:
          - key
        properties:
          key:
            type: string
          description:
            type: string
    example:
      error:
        key: SDK.Error.408.RequestTimeout
  ConflictError:
    type: object
    required:
      - error
    properties:
      error:
        type: object
        required:
          - key
        properties:
          key:
            type: string
          description:
            type: string
    example:
      error:
        key: SDK.Error.HomeAppliance.Connection.Initialization.Timeout
        description: HomeAppliance did not respond to connection initialization requests in time, it might be offline
  SelectedProgramNotSetError:
    type: object
    required:
      - error
    properties:
      error:
        type: object
        required:
          - key
        properties:
          key:
            type: string
          description:
            type: string
    example:
      error:
        key: SDK.Error.SelectedProgramNotSet
        description: Request cannot be performed since no program is selected
  ActiveProgramNotSetError:
    type: object
    required:
      - error
    properties:
      error:
        type: object
        required:
          - key
        properties:
          key:
            type: string
          description:
            type: string
    example:
      error:
        key: SDK.Error.ActiveProgramNotSet
        description: Request cannot be performed since no active program is set
  WrongOperationStateError:
    type: object
    required:
      - error
    properties:
      error:
        type: object
        required:
          - key
        properties:
          key:
            type: string
          description:
            type: string
    example:
      error:
        key: SDK.Error.WrongOperationState
        description: Request cannot be performed since OperationState is not DelayedStart, Run, Pause or ActionRequired
  ProgramNotAvailableError:
    type: object
    required:
      - error
    properties:
      error:
        type: object
        required:
          - key
        properties:
          key:
            type: string
          description:
            type: string
    example:
      error:
        key: SDK.Error.ProgramNotAvailable
        description: Program currently not available
  UnsupportedMediaTypeError:
    type: object
    required:
      - error
    properties:
      error:
        type: object
        required:
          - key
        properties:
          key:
            type: string
          description:
            type: string
    example:
      error:
        key: "415"
        description: The request's Content-Type is not supported. Expected:\napplication/vnd.bsh.sdk.v1+json
  TooManyRequestsError:
    type: object
    required:
      - error
    properties:
      error:
        type: object
        required:
          - key
        properties:
          key:
            type: string
          description:
            type: string
    example:
      error:
        key: "429"
        description: The user has sent too many requests in a given amount of time.
  InteralServerError:
    type: object
    required:
      - error
    properties:
      error:
        type: object
        required:
          - key
        properties:
          key:
            type: string
          description:
            type: string
    example:
      error:
        key: Internal Server Error
        description: Could not validate permissions to access HomeAppliance
  Conflict:
    type: object
    required:
      - error
    properties:
      error:
        type: object
        required:
          - key
        properties:
          key:
            type: string
          description:
            type: string
    example:
      error:
        key: "409"
        description: Command/Query cannot be executed for the home appliance, the error response contains the error details




  ArrayOfEvents:
    type: object
    required:
      - items
    properties:
      items:
        type: array
        items:
          type: object
          required:
            - key
            - timestamp
            - level
            - handling
            - value
          properties:
            key:
              type: string
              description: Feature key of the event
            name:
              type: string
              description: User-friendly, localized name of the feature key
            uri:
              type: string
              description: URI of the resource that changed
            timestamp:
              type: integer
              format: int64
              description: Creation time of event as unix timestamp
            level:
              type: string
              description: |
                Level of the event, possible values: critical, alert, warning, hint, info
            handling:
              type: string
              description: |
                Expected activity, possible values: none, acknowledge, decision
            value:
              type:
                - string
                - number
                - boolean
              description: New value, e.g. in case of a status update
            displayvalue:
              type: string
              description: User-friendly, localized name of the enumeration value
            unit:
              type: string
              description: Unit of the value
    example:
      items:
        - key: Cooking.Oven.Option.SetpointTemperature
          name: Target temperature for the oven
          uri: /api/homeappliances/BOSCH-HNG6764B6-0000000011FF/programs/active/options/Cooking.Oven.Option.SetpointTemperature
          timestamp: 1556793979
          level: hint
