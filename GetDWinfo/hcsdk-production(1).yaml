securityDefinitions:
  homeconnect_auth:
    description: |
      The Home Connect API uses the authorization code grant flow of the OAuth2
      Authorization Framework as specified in RFC 6749 (https://tools.ietf.org/html/rfc6749).
      Authorization tokens have to be transmitted in the HTTP headers as defined
      in RFC 6750 (https://tools.ietf.org/html/rfc6750).
    type: oauth2
    flow: accessCode
    authorizationUrl: https://api.home-connect.com/security/oauth/authorize
    tokenUrl: https://api.home-connect.com/security/oauth/token
    x-homeconnect-revokeUrl: https://api.home-connect.com/security/oauth/revoke
    x-homeconnect-deviceAuthorizationUrl: https://api.home-connect.com/security/oauth/device_authorization
    scopes:
      IdentifyAppliance: Grants right to identify a home appliance under /api/homeappliances

      Monitor: Grants access to read resources under /api/homeappliances except images and settings
      Control: Grants access to modify resources under under /api/homeappliances except images and settings
      Images: Grants access to read resources under /api/homeappliances/{haId}/images
      Settings: Grants access to read and modify resources under /api/homeappliances/{haId}/settings
