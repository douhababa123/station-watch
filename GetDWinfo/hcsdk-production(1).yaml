          - Dryer-Monitor
          - CoffeeMaker-Monitor
          - Hob-Monitor
          - Hood-Monitor
          - CleaningRobot-Monitor
          - WasherDryer-Monitor
          - Refrigerator-Monitor
          - Freezer-Monitor
          - WineCooler-Monitor
          - CookProcessor-Monitor
